# Dev orchestration: app services on the host (watch). Infra (postgres + redis + mock-platform)
# and DB migrations are handled by `make dev` before mprocs launches — no infra proc here.
# The host backtester runs in BIND mode (no BACKTESTER_SANDBOX_OVERLAY_VOLUME* in .env.dev) so
# its sandbox `docker run` hits the host daemon natively — no DooD in dev.
#
# Run via `make dev` (installs deps, starts infra detached, migrates, then launches mprocs).
# Requires sibling repos present: ../backtester (pnpm) and ../office (npm).
procs:
  ingress:
    shell: "set -a && . ./.env.dev && exec node --watch --experimental-transform-types src/ingress/server.ts"

  worker:
    shell: "set -a && . ./.env.dev && exec node --watch --experimental-transform-types src/worker/worker.ts"

  backtester:
    shell: "set -a && . ./.env.dev && cd \"$TRADING_BACKTESTER_PATH\" && exec pnpm start"

  office-server:
    shell: "set -a && . ./.env.dev && cd \"$TRADING_OFFICE_PATH\" && exec npm run dev:server"

  office-web:
    shell: "set -a && . ./.env.dev && cd \"$TRADING_OFFICE_PATH\" && exec npm run dev:web:connected"
