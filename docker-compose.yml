# Base stack — every shared service. Host publishing lives in the mode overlays
# (docker-compose.{demo,local,vps}.yml); this base uses `expose` only.
#
# Run with an overlay, e.g.:
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml --env-file .env.demo up --build
#
# Infra-only for host development (run `pnpm ingress` / `pnpm worker` on the host):
#   docker compose up postgres redis

# Shared build for the lab image — declared once, reused by ingress/migrate/worker via the
# YAML anchor below. Docker builds trading-lab:local a single time (keyed by the image tag),
# so no service depends on another to produce the image.
x-lab-image: &lab-image
  build:
    context: .
  image: trading-lab:local

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
      POSTGRES_DB: trading_lab
    volumes:
      - lab_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d trading_lab"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [trading]

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [trading]

  ingress:
    <<: *lab-image
    # Workaround: current source uses TS parameter properties unsupported by
    # `--experimental-strip-types` (what `pnpm ingress` uses). transform-types parses them.
    # Infra-contained; source cleanup is deferred. (migrate stays on pnpm — drizzle-kit only.)
    command: ["node", "--experimental-transform-types", "src/ingress/server.ts"]
    environment:
      DATABASE_URL: postgres://lab:lab@postgres:5432/trading_lab
      REDIS_URL: redis://redis:6379
      INGRESS_PORT: "3000"
      READ_API_PORT: "3100"
      TRADING_LAB_READ_TOKEN: ${TRADING_LAB_READ_TOKEN:-}
      TRADING_LAB_CHAT_TOKEN: ${TRADING_LAB_CHAT_TOKEN:-}
      TRADING_LAB_TASK_TOKEN: ${TRADING_LAB_TASK_TOKEN:-}
      TRADING_LAB_CALLBACK_TOKEN: ${TRADING_LAB_CALLBACK_TOKEN:-}
      TRADING_LAB_CALLBACK_PUBLIC_URL: ${TRADING_LAB_CALLBACK_PUBLIC_URL:-}
      TRADING_PLATFORM_INTEGRATION: ${TRADING_PLATFORM_INTEGRATION:-mock}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-anthropic}
      STRATEGY_ANALYST_ADAPTER: ${STRATEGY_ANALYST_ADAPTER:-fake}
      STRATEGY_ANALYST_MODEL: ${STRATEGY_ANALYST_MODEL:-anthropic/claude-sonnet-4-6}
      RESEARCHER_ADAPTER: ${RESEARCHER_ADAPTER:-fake}
      RESEARCHER_MODEL: ${RESEARCHER_MODEL:-anthropic/claude-sonnet-4-6}
      CRITIC_ADAPTER: ${CRITIC_ADAPTER:-fake}
      CRITIC_MODEL: ${CRITIC_MODEL:-anthropic/claude-sonnet-4-6}
      ENABLE_CRITIC_AGENT: ${ENABLE_CRITIC_AGENT:-false}
      BUILDER_ADAPTER: ${BUILDER_ADAPTER:-fake}
      BUILDER_MODEL: ${BUILDER_MODEL:-anthropic/claude-sonnet-4-6}
      TURN_INTERPRETER_ADAPTER: ${TURN_INTERPRETER_ADAPTER:-fake}
      TURN_INTERPRETER_MODEL: ${TURN_INTERPRETER_MODEL:-openrouter/google/gemini-3.1-flash-lite}
      TURN_INTERPRETER_MIN_CONFIDENCE: ${TURN_INTERPRETER_MIN_CONFIDENCE:-0.6}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Operator RAG (evidence-first retrieval). Disabled by default; flip
      # OPERATOR_RAG_ENABLED=true (+ OPENROUTER_API_KEY) to activate hybrid retrieval.
      OPERATOR_RAG_ENABLED: ${OPERATOR_RAG_ENABLED:-false}
      OPERATOR_EMBEDDING_PROVIDER: ${OPERATOR_EMBEDDING_PROVIDER:-openrouter}
      OPERATOR_EMBEDDING_MODEL: ${OPERATOR_EMBEDDING_MODEL:-baai/bge-m3}
      OPERATOR_EMBEDDING_DIMENSIONS: ${OPERATOR_EMBEDDING_DIMENSIONS:-1024}
      OPERATOR_RETRIEVAL_INDEX_VERSION: ${OPERATOR_RETRIEVAL_INDEX_VERSION:-1}
      OPERATOR_RETRIEVAL_SOFT_TIMEOUT_MS: ${OPERATOR_RETRIEVAL_SOFT_TIMEOUT_MS:-5000}
      OPERATOR_RETRIEVAL_HARD_TIMEOUT_MS: ${OPERATOR_RETRIEVAL_HARD_TIMEOUT_MS:-10000}
      OPERATOR_RETRIEVAL_LEXICAL_LIMIT: ${OPERATOR_RETRIEVAL_LEXICAL_LIMIT:-50}
      OPERATOR_RETRIEVAL_VECTOR_LIMIT: ${OPERATOR_RETRIEVAL_VECTOR_LIMIT:-50}
      OPERATOR_RETRIEVAL_FUSED_LIMIT: ${OPERATOR_RETRIEVAL_FUSED_LIMIT:-20}
      OPERATOR_RERANKER: ${OPERATOR_RERANKER:-none}
      OPERATOR_RERANK_TIMEOUT_MS: ${OPERATOR_RERANK_TIMEOUT_MS:-1500}
      OPERATOR_RERANK_LIMIT: ${OPERATOR_RERANK_LIMIT:-5}
      OPERATOR_RERANK_MIN_CANDIDATES: ${OPERATOR_RERANK_MIN_CANDIDATES:-10}
      OPERATOR_RERANK_RRF_MARGIN: ${OPERATOR_RERANK_RRF_MARGIN:-0.002}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"
      - "3100"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [trading]

  migrate:
    <<: *lab-image
    command: ["pnpm", "db:migrate"]
    environment:
      DATABASE_URL: postgres://lab:lab@postgres:5432/trading_lab
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks: [trading]

  worker:
    <<: *lab-image
    # Same transform-types workaround as ingress (see note above).
    command: ["node", "--experimental-transform-types", "src/worker/worker.ts"]
    environment:
      DATABASE_URL: postgres://lab:lab@postgres:5432/trading_lab
      REDIS_URL: redis://redis:6379
      TRADING_PLATFORM_INTEGRATION: ${TRADING_PLATFORM_INTEGRATION:-mock}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-anthropic}
      STRATEGY_ANALYST_ADAPTER: ${STRATEGY_ANALYST_ADAPTER:-fake}
      STRATEGY_ANALYST_MODEL: ${STRATEGY_ANALYST_MODEL:-anthropic/claude-sonnet-4-6}
      RESEARCHER_ADAPTER: ${RESEARCHER_ADAPTER:-fake}
      RESEARCHER_MODEL: ${RESEARCHER_MODEL:-anthropic/claude-sonnet-4-6}
      CRITIC_ADAPTER: ${CRITIC_ADAPTER:-fake}
      CRITIC_MODEL: ${CRITIC_MODEL:-anthropic/claude-sonnet-4-6}
      ENABLE_CRITIC_AGENT: ${ENABLE_CRITIC_AGENT:-false}
      BUILDER_ADAPTER: ${BUILDER_ADAPTER:-fake}
      BUILDER_MODEL: ${BUILDER_MODEL:-anthropic/claude-sonnet-4-6}
      TURN_INTERPRETER_ADAPTER: ${TURN_INTERPRETER_ADAPTER:-fake}
      TURN_INTERPRETER_MODEL: ${TURN_INTERPRETER_MODEL:-openrouter/google/gemini-3.1-flash-lite}
      TURN_INTERPRETER_MIN_CONFIDENCE: ${TURN_INTERPRETER_MIN_CONFIDENCE:-0.6}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Operator RAG (evidence-first retrieval). Disabled by default; flip
      # OPERATOR_RAG_ENABLED=true (+ OPENROUTER_API_KEY) to activate hybrid retrieval.
      OPERATOR_RAG_ENABLED: ${OPERATOR_RAG_ENABLED:-false}
      OPERATOR_EMBEDDING_PROVIDER: ${OPERATOR_EMBEDDING_PROVIDER:-openrouter}
      OPERATOR_EMBEDDING_MODEL: ${OPERATOR_EMBEDDING_MODEL:-baai/bge-m3}
      OPERATOR_EMBEDDING_DIMENSIONS: ${OPERATOR_EMBEDDING_DIMENSIONS:-1024}
      OPERATOR_RETRIEVAL_INDEX_VERSION: ${OPERATOR_RETRIEVAL_INDEX_VERSION:-1}
      OPERATOR_RETRIEVAL_SOFT_TIMEOUT_MS: ${OPERATOR_RETRIEVAL_SOFT_TIMEOUT_MS:-5000}
      OPERATOR_RETRIEVAL_HARD_TIMEOUT_MS: ${OPERATOR_RETRIEVAL_HARD_TIMEOUT_MS:-10000}
      OPERATOR_RETRIEVAL_LEXICAL_LIMIT: ${OPERATOR_RETRIEVAL_LEXICAL_LIMIT:-50}
      OPERATOR_RETRIEVAL_VECTOR_LIMIT: ${OPERATOR_RETRIEVAL_VECTOR_LIMIT:-50}
      OPERATOR_RETRIEVAL_FUSED_LIMIT: ${OPERATOR_RETRIEVAL_FUSED_LIMIT:-20}
      OPERATOR_RERANKER: ${OPERATOR_RERANKER:-none}
      OPERATOR_RERANK_TIMEOUT_MS: ${OPERATOR_RERANK_TIMEOUT_MS:-1500}
      OPERATOR_RERANK_LIMIT: ${OPERATOR_RERANK_LIMIT:-5}
      OPERATOR_RERANK_MIN_CANDIDATES: ${OPERATOR_RERANK_MIN_CANDIDATES:-10}
      OPERATOR_RERANK_RRF_MARGIN: ${OPERATOR_RERANK_RRF_MARGIN:-0.002}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [trading]

  office-server:
    build:
      context: ${TRADING_OFFICE_PATH:-../trading-office}
      dockerfile: apps/server/Dockerfile
    environment:
      OFFICE_CONNECTOR_MODE: trading-lab
      OFFICE_SERVER_PORT: "8787"
      OFFICE_CORS_ORIGIN: ${OFFICE_CORS_ORIGIN:-http://localhost:8080}
      TRADING_LAB_READ_URL: http://ingress:3100
      TRADING_LAB_READ_TOKEN: ${TRADING_LAB_READ_TOKEN:-}
      TRADING_LAB_CHAT_URL: http://ingress:3000
      TRADING_LAB_CHAT_TOKEN: ${TRADING_LAB_CHAT_TOKEN:-}
      OFFICE_PLATFORM_ENABLED: ${OFFICE_PLATFORM_ENABLED:-false}
      TRADING_PLATFORM_READ_URL: ${TRADING_PLATFORM_READ_URL:-}
      TRADING_PLATFORM_READ_TOKEN: ${TRADING_PLATFORM_READ_TOKEN:-}
    depends_on:
      ingress:
        condition: service_healthy
    expose:
      - "8787"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8787/api/office/agents/statuses').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks: [trading]

  office-web:
    build:
      context: ${TRADING_OFFICE_PATH:-../trading-office}
      dockerfile: apps/web/Dockerfile
      args:
        VITE_OFFICE_MODE: connected
        VITE_OFFICE_GATEWAY_URL: ${VITE_OFFICE_GATEWAY_URL:-http://localhost:8787}
    depends_on:
      office-server:
        condition: service_started
    expose:
      - "80"
    networks: [trading]

volumes:
  lab_pg:

networks:
  trading:
    driver: bridge
