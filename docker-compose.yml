# Base stack — every shared service. Host publishing lives in the mode overlays
# (docker-compose.{demo,local,vps}.yml); this base uses `expose` only.
#
# Run with an overlay, e.g.:
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml --env-file .env.demo up --build
#
# Infra-only for host development (run `pnpm ingress` / `pnpm worker` on the host):
#   docker compose up postgres redis

# Shared build for the lab image — declared once, reused by ingress/migrate/worker via the
# YAML anchor below. Docker builds trading-lab:local a single time (keyed by the image tag),
# so no service depends on another to produce the image.
x-lab-image: &lab-image
  build:
    context: .
  image: trading-lab:local

# Env that loadEnv reads but the explicit per-service maps historically omitted — merged into BOTH
# worker and ingress via `<<: *lab-app-env` so a documented knob is never a silent no-op (P1-16).
# Empty passthrough (`${VAR:-}`) lets loadEnv apply its own defaults, avoiding default-drift with
# .env.example; explicit per-service keys still win over anything set here.
x-lab-app-env: &lab-app-env
  # External backtester integration. Absent, a TRADING_PLATFORM_INTEGRATION=backtester deploy
  # silently falls back to http://127.0.0.1:8080 inside the container.
  BACKTESTER_API_URL: ${BACKTESTER_API_URL:-}
  BACKTESTER_API_TOKEN: ${BACKTESTER_API_TOKEN:-}
  ARTIFACT_DIR: ${ARTIFACT_DIR:-}
  TRADING_PLATFORM_BASELINE_VERSION: ${TRADING_PLATFORM_BASELINE_VERSION:-}
  PLATFORM_RUN_MAX_POLLS: ${PLATFORM_RUN_MAX_POLLS:-}
  PLATFORM_RUN_POLL_DELAY_MS: ${PLATFORM_RUN_POLL_DELAY_MS:-}
  MAX_HYPOTHESES_PER_CYCLE: ${MAX_HYPOTHESES_PER_CYCLE:-}
  REVISION_BATCH_MAX: ${REVISION_BATCH_MAX:-}
  # Backtest evaluator thresholds
  EVAL_MIN_TRADES: ${EVAL_MIN_TRADES:-}
  EVAL_MIN_PNL_DELTA_USD: ${EVAL_MIN_PNL_DELTA_USD:-}
  EVAL_MAX_DRAWDOWN_TOLERANCE_PCT: ${EVAL_MAX_DRAWDOWN_TOLERANCE_PCT:-}
  EVAL_FRAGILITY_TOP_TRADE_PCT: ${EVAL_FRAGILITY_TOP_TRADE_PCT:-}
  EVAL_STRONG_PNL_DELTA_USD: ${EVAL_STRONG_PNL_DELTA_USD:-}
  EVAL_MIN_PROFIT_FACTOR: ${EVAL_MIN_PROFIT_FACTOR:-}
  # Trade-preservation veto gate (R2) — kill-switch + thresholds; runs in the worker.
  LAB_TRADE_PRESERVATION_GATE: ${LAB_TRADE_PRESERVATION_GATE:-}
  LAB_TRADE_PRESERVATION_WINNER_RETENTION: ${LAB_TRADE_PRESERVATION_WINNER_RETENTION:-}
  LAB_TRADE_PRESERVATION_MAX_TRADE_DROP_PCT: ${LAB_TRADE_PRESERVATION_MAX_TRADE_DROP_PCT:-}
  LAB_TRADE_PRESERVATION_MIN_WINNER_SAMPLE: ${LAB_TRADE_PRESERVATION_MIN_WINNER_SAMPLE:-}
  LAB_TRADE_PRESERVATION_ABSTENTION_SHARE: ${LAB_TRADE_PRESERVATION_ABSTENTION_SHARE:-}
  LAB_TRADE_PRESERVATION_EOD_SHARE: ${LAB_TRADE_PRESERVATION_EOD_SHARE:-}
  LAB_TRADE_PRESERVATION_MATCH_TOLERANCE_MS: ${LAB_TRADE_PRESERVATION_MATCH_TOLERANCE_MS:-}
  # LLM-consolidation (G3b) — OFF unless CONSOLIDATOR_ADAPTER is set.
  CONSOLIDATOR_ADAPTER: ${CONSOLIDATOR_ADAPTER:-}
  CONSOLIDATOR_MODEL: ${CONSOLIDATOR_MODEL:-}
  LAB_CONSOLIDATION_DEPTH_THRESHOLD: ${LAB_CONSOLIDATION_DEPTH_THRESHOLD:-}
  LAB_CONSOLIDATION_TOL_REL: ${LAB_CONSOLIDATION_TOL_REL:-}
  LAB_CONSOLIDATION_TOL_ABS: ${LAB_CONSOLIDATION_TOL_ABS:-}
  # WFO decision agents
  WFO_GATE1_ADAPTER: ${WFO_GATE1_ADAPTER:-}
  WFO_GATE1_MODEL: ${WFO_GATE1_MODEL:-}
  WFO_SWEEP_DESIGNER_ADAPTER: ${WFO_SWEEP_DESIGNER_ADAPTER:-}
  WFO_SWEEP_DESIGNER_MODEL: ${WFO_SWEEP_DESIGNER_MODEL:-}
  WFO_RESULT_INTERPRETER_ADAPTER: ${WFO_RESULT_INTERPRETER_ADAPTER:-}
  WFO_RESULT_INTERPRETER_MODEL: ${WFO_RESULT_INTERPRETER_MODEL:-}
  # Bot-results / ops-read (paper monitor + trade evidence + market history)
  LAB_BOT_RESULTS_INTEGRATION: ${LAB_BOT_RESULTS_INTEGRATION:-}
  LAB_OPS_READ_URL: ${LAB_OPS_READ_URL:-}
  LAB_OPS_READ_TOKEN: ${LAB_OPS_READ_TOKEN:-}
  LAB_OPS_READ_FIXTURE_DIR: ${LAB_OPS_READ_FIXTURE_DIR:-}
  LAB_MARKET_HISTORY_URL: ${LAB_MARKET_HISTORY_URL:-}

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
      POSTGRES_DB: trading_lab
    volumes:
      - lab_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d trading_lab"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [trading]

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [trading]

  phoenix:
    image: arizephoenix/phoenix:17.11.0
    environment:
      # Persist traces under a mounted dir so they survive restarts (esp. on vps).
      PHOENIX_WORKING_DIR: /mnt/phoenix
    volumes:
      - phoenix_data:/mnt/phoenix
    expose:
      - "6006"
    restart: "no"
    networks: [trading]

  ingress:
    <<: *lab-image
    # Workaround: current source uses TS parameter properties unsupported by
    # `--experimental-strip-types` (what `pnpm ingress` uses). transform-types parses them.
    # Infra-contained; source cleanup is deferred. (migrate stays on pnpm — drizzle-kit only.)
    command: ["node", "--experimental-transform-types", "src/ingress/server.ts"]
    environment:
      # Shared research/platform env (BACKTESTER_*, preservation, WFO, consolidation, eval, ops-read).
      <<: *lab-app-env
      DATABASE_URL: postgres://lab:lab@postgres:5432/trading_lab
      REDIS_URL: redis://redis:6379
      INGRESS_PORT: "3000"
      READ_API_PORT: "3100"
      # Postgres pool size (global; createDbClient runs in ingress too). See slice 2026-07-11.
      LAB_PG_POOL_MAX: ${LAB_PG_POOL_MAX:-10}
      TRADING_LAB_READ_TOKEN: ${TRADING_LAB_READ_TOKEN:-}
      TRADING_LAB_CHAT_TOKEN: ${TRADING_LAB_CHAT_TOKEN:-}
      # Chat LLM throughput guard (P1-22) — empty passes through to loadEnv defaults; 0 disables.
      CHAT_RATE_MAX_TURNS: ${CHAT_RATE_MAX_TURNS:-}
      CHAT_RATE_WINDOW_MS: ${CHAT_RATE_WINDOW_MS:-}
      TRADING_LAB_TASK_TOKEN: ${TRADING_LAB_TASK_TOKEN:-}
      TRADING_LAB_CALLBACK_TOKEN: ${TRADING_LAB_CALLBACK_TOKEN:-}
      TRADING_LAB_CALLBACK_PUBLIC_URL: ${TRADING_LAB_CALLBACK_PUBLIC_URL:-}
      TRADING_PLATFORM_INTEGRATION: ${TRADING_PLATFORM_INTEGRATION:-mock}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-anthropic}
      LAB_AGENTS_ADAPTER: ${LAB_AGENTS_ADAPTER:-fake}
      STRATEGY_ANALYST_ADAPTER: ${STRATEGY_ANALYST_ADAPTER:-}
      STRATEGY_ANALYST_MODEL: ${STRATEGY_ANALYST_MODEL:-openrouter/openai/gpt-5.5}
      RESEARCHER_ADAPTER: ${RESEARCHER_ADAPTER:-}
      RESEARCHER_MODEL: ${RESEARCHER_MODEL:-anthropic/claude-sonnet-4-6}
      CRITIC_ADAPTER: ${CRITIC_ADAPTER:-}
      CRITIC_MODEL: ${CRITIC_MODEL:-anthropic/claude-sonnet-4-6}
      ENABLE_CRITIC_AGENT: ${ENABLE_CRITIC_AGENT:-false}
      BUILDER_ADAPTER: ${BUILDER_ADAPTER:-}
      BUILDER_MODEL: ${BUILDER_MODEL:-anthropic/claude-sonnet-4-6}
      TURN_INTERPRETER_ADAPTER: ${TURN_INTERPRETER_ADAPTER:-}
      TURN_INTERPRETER_MODEL: ${TURN_INTERPRETER_MODEL:-openrouter/google/gemini-3.1-flash-lite}
      TURN_INTERPRETER_MIN_CONFIDENCE: ${TURN_INTERPRETER_MIN_CONFIDENCE:-0.6}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Phoenix observability (Mastra agent tracing). Off by default; the demo/local/vps
      # env files flip PHOENIX_ENABLED=true. Endpoint targets the compose `phoenix` service.
      PHOENIX_ENABLED: ${PHOENIX_ENABLED:-false}
      PHOENIX_COLLECTOR_ENDPOINT: ${PHOENIX_COLLECTOR_ENDPOINT:-http://phoenix:6006/v1/traces}
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-trading-lab}
      # Operator RAG (evidence-first retrieval). Disabled by default; flip
      # OPERATOR_RAG_ENABLED=true (+ OPENROUTER_API_KEY) to activate hybrid retrieval.
      OPERATOR_RAG_ENABLED: ${OPERATOR_RAG_ENABLED:-false}
      OPERATOR_EMBEDDING_PROVIDER: ${OPERATOR_EMBEDDING_PROVIDER:-openrouter}
      OPERATOR_EMBEDDING_MODEL: ${OPERATOR_EMBEDDING_MODEL:-baai/bge-m3}
      OPERATOR_EMBEDDING_DIMENSIONS: ${OPERATOR_EMBEDDING_DIMENSIONS:-1024}
      OPERATOR_RETRIEVAL_INDEX_VERSION: ${OPERATOR_RETRIEVAL_INDEX_VERSION:-1}
      OPERATOR_RETRIEVAL_SOFT_TIMEOUT_MS: ${OPERATOR_RETRIEVAL_SOFT_TIMEOUT_MS:-5000}
      OPERATOR_RETRIEVAL_HARD_TIMEOUT_MS: ${OPERATOR_RETRIEVAL_HARD_TIMEOUT_MS:-10000}
      OPERATOR_RETRIEVAL_LEXICAL_LIMIT: ${OPERATOR_RETRIEVAL_LEXICAL_LIMIT:-50}
      OPERATOR_RETRIEVAL_VECTOR_LIMIT: ${OPERATOR_RETRIEVAL_VECTOR_LIMIT:-50}
      OPERATOR_RETRIEVAL_FUSED_LIMIT: ${OPERATOR_RETRIEVAL_FUSED_LIMIT:-20}
      OPERATOR_RERANKER: ${OPERATOR_RERANKER:-none}
      OPERATOR_RERANK_TIMEOUT_MS: ${OPERATOR_RERANK_TIMEOUT_MS:-1500}
      OPERATOR_RERANK_LIMIT: ${OPERATOR_RERANK_LIMIT:-5}
      OPERATOR_RERANK_MIN_CANDIDATES: ${OPERATOR_RERANK_MIN_CANDIDATES:-10}
      OPERATOR_RERANK_RRF_MARGIN: ${OPERATOR_RERANK_RRF_MARGIN:-0.002}
      # Pre-flight strategy critic (ON by default; single + grok-4.3). Chat=HITL, crawler/-/tasks=auto.
      STRATEGY_PREFLIGHT_CRITIQUE: ${STRATEGY_PREFLIGHT_CRITIQUE:-true}
      # Adapter follows LAB_AGENTS_ADAPTER unless set; the default-on critic is the FAKE echo in keyless dev —
      # the real grok-4.3 critic needs LAB_AGENTS_ADAPTER=mastra (or STRATEGY_CRITIC_ADAPTER=mastra) + OPENROUTER_API_KEY.
      STRATEGY_CRITIC_ADAPTER: ${STRATEGY_CRITIC_ADAPTER:-fake}
      STRATEGY_CRITIC_MODE: ${STRATEGY_CRITIC_MODE:-single}
      STRATEGY_CRITIC_MODEL: ${STRATEGY_CRITIC_MODEL:-openrouter/x-ai/grok-4.3}
      STRATEGY_REFINER_MODEL: ${STRATEGY_REFINER_MODEL:-}
      # Research task token budget configuration
      RESEARCH_TASK_TOKEN_BUDGET: ${RESEARCH_TASK_TOKEN_BUDGET:-}
      # Platform paper-intake (feature 036/066). Unset URL = paper bridge disabled (kill-switch).
      LAB_PAPER_INTAKE_URL: ${LAB_PAPER_INTAKE_URL:-}
      LAB_PAPER_INTAKE_TOKEN: ${LAB_PAPER_INTAKE_TOKEN:-}
      # paper.monitor (slice G4) — adaptive paper-observation window + self-reschedule poll.
      PAPER_MONITOR_POLL_MS: ${PAPER_MONITOR_POLL_MS:-21600000}
      PAPER_WINDOW_MIN_TRADES: ${PAPER_WINDOW_MIN_TRADES:-30}
      PAPER_WINDOW_LOW_CONFIDENCE_THRESHOLD: ${PAPER_WINDOW_LOW_CONFIDENCE_THRESHOLD:-15}
      PAPER_WINDOW_MIN_DAYS: ${PAPER_WINDOW_MIN_DAYS:-3}
      PAPER_WINDOW_MAX_DAYS: ${PAPER_WINDOW_MAX_DAYS:-30}
      PAPER_MONITOR_MAX_WAIT_DAYS: ${PAPER_MONITOR_MAX_WAIT_DAYS:-7}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"
      - "3100"
    healthcheck:
      # Liveness on the always-on ingress port :3000. Must NOT target :3100/readyz — that read-API
      # listener only starts when TRADING_LAB_READ_TOKEN is set, so probing it wedges the container
      # 'unhealthy' when the token is unset and blocks office-server's depends_on (P1-18).
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [trading]

  migrate:
    <<: *lab-image
    command: ["pnpm", "db:migrate"]
    environment:
      DATABASE_URL: postgres://lab:lab@postgres:5432/trading_lab
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks: [trading]

  worker:
    <<: *lab-image
    # Same transform-types workaround as ingress (see note above).
    command: ["node", "--experimental-transform-types", "src/worker/worker.ts"]
    environment:
      # Shared research/platform env (BACKTESTER_*, preservation, WFO, consolidation, eval, ops-read).
      <<: *lab-app-env
      DATABASE_URL: postgres://lab:lab@postgres:5432/trading_lab
      REDIS_URL: redis://redis:6379
      TRADING_PLATFORM_INTEGRATION: ${TRADING_PLATFORM_INTEGRATION:-mock}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-anthropic}
      LAB_AGENTS_ADAPTER: ${LAB_AGENTS_ADAPTER:-fake}
      STRATEGY_ANALYST_ADAPTER: ${STRATEGY_ANALYST_ADAPTER:-}
      STRATEGY_ANALYST_MODEL: ${STRATEGY_ANALYST_MODEL:-openrouter/openai/gpt-5.5}
      RESEARCHER_ADAPTER: ${RESEARCHER_ADAPTER:-}
      RESEARCHER_MODEL: ${RESEARCHER_MODEL:-anthropic/claude-sonnet-4-6}
      CRITIC_ADAPTER: ${CRITIC_ADAPTER:-}
      CRITIC_MODEL: ${CRITIC_MODEL:-anthropic/claude-sonnet-4-6}
      ENABLE_CRITIC_AGENT: ${ENABLE_CRITIC_AGENT:-false}
      BUILDER_ADAPTER: ${BUILDER_ADAPTER:-}
      BUILDER_MODEL: ${BUILDER_MODEL:-anthropic/claude-sonnet-4-6}
      TURN_INTERPRETER_ADAPTER: ${TURN_INTERPRETER_ADAPTER:-}
      TURN_INTERPRETER_MODEL: ${TURN_INTERPRETER_MODEL:-openrouter/google/gemini-3.1-flash-lite}
      TURN_INTERPRETER_MIN_CONFIDENCE: ${TURN_INTERPRETER_MIN_CONFIDENCE:-0.6}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      PHOENIX_ENABLED: ${PHOENIX_ENABLED:-false}
      PHOENIX_COLLECTOR_ENDPOINT: ${PHOENIX_COLLECTOR_ENDPOINT:-http://phoenix:6006/v1/traces}
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-trading-lab}
      # Operator RAG (evidence-first retrieval). Disabled by default; flip
      # OPERATOR_RAG_ENABLED=true (+ OPENROUTER_API_KEY) to activate hybrid retrieval.
      OPERATOR_RAG_ENABLED: ${OPERATOR_RAG_ENABLED:-false}
      OPERATOR_EMBEDDING_PROVIDER: ${OPERATOR_EMBEDDING_PROVIDER:-openrouter}
      OPERATOR_EMBEDDING_MODEL: ${OPERATOR_EMBEDDING_MODEL:-baai/bge-m3}
      OPERATOR_EMBEDDING_DIMENSIONS: ${OPERATOR_EMBEDDING_DIMENSIONS:-1024}
      OPERATOR_RETRIEVAL_INDEX_VERSION: ${OPERATOR_RETRIEVAL_INDEX_VERSION:-1}
      OPERATOR_RETRIEVAL_SOFT_TIMEOUT_MS: ${OPERATOR_RETRIEVAL_SOFT_TIMEOUT_MS:-5000}
      OPERATOR_RETRIEVAL_HARD_TIMEOUT_MS: ${OPERATOR_RETRIEVAL_HARD_TIMEOUT_MS:-10000}
      OPERATOR_RETRIEVAL_LEXICAL_LIMIT: ${OPERATOR_RETRIEVAL_LEXICAL_LIMIT:-50}
      OPERATOR_RETRIEVAL_VECTOR_LIMIT: ${OPERATOR_RETRIEVAL_VECTOR_LIMIT:-50}
      OPERATOR_RETRIEVAL_FUSED_LIMIT: ${OPERATOR_RETRIEVAL_FUSED_LIMIT:-20}
      OPERATOR_RERANKER: ${OPERATOR_RERANKER:-none}
      OPERATOR_RERANK_TIMEOUT_MS: ${OPERATOR_RERANK_TIMEOUT_MS:-1500}
      OPERATOR_RERANK_LIMIT: ${OPERATOR_RERANK_LIMIT:-5}
      OPERATOR_RERANK_MIN_CANDIDATES: ${OPERATOR_RERANK_MIN_CANDIDATES:-10}
      OPERATOR_RERANK_RRF_MARGIN: ${OPERATOR_RERANK_RRF_MARGIN:-0.002}
      # Pre-flight strategy critic (ON by default; single + grok-4.3). Chat=HITL, crawler/-/tasks=auto.
      STRATEGY_PREFLIGHT_CRITIQUE: ${STRATEGY_PREFLIGHT_CRITIQUE:-true}
      # Adapter follows LAB_AGENTS_ADAPTER unless set; the default-on critic is the FAKE echo in keyless dev —
      # the real grok-4.3 critic needs LAB_AGENTS_ADAPTER=mastra (or STRATEGY_CRITIC_ADAPTER=mastra) + OPENROUTER_API_KEY.
      STRATEGY_CRITIC_ADAPTER: ${STRATEGY_CRITIC_ADAPTER:-fake}
      STRATEGY_CRITIC_MODE: ${STRATEGY_CRITIC_MODE:-single}
      STRATEGY_CRITIC_MODEL: ${STRATEGY_CRITIC_MODEL:-openrouter/x-ai/grok-4.3}
      STRATEGY_REFINER_MODEL: ${STRATEGY_REFINER_MODEL:-}
      # Research task token budget configuration
      RESEARCH_TASK_TOKEN_BUDGET: ${RESEARCH_TASK_TOKEN_BUDGET:-}
      # Task-lane + pool knobs (slice 2026-07-11). Both lanes hold backtester-submitters;
      # keep both concurrencies at 1 until the shared backtester semaphore (1.4).
      LAB_QUEUE_CONCURRENCY: ${LAB_QUEUE_CONCURRENCY:-1}
      LAB_REVISION_QUEUE_CONCURRENCY: ${LAB_REVISION_QUEUE_CONCURRENCY:-1}
      RESEARCH_GRID_CONCURRENCY: ${RESEARCH_GRID_CONCURRENCY:-4}
      LAB_PG_POOL_MAX: ${LAB_PG_POOL_MAX:-10}
      # Platform paper-intake (feature 036/066). Unset URL = paper bridge disabled (kill-switch).
      LAB_PAPER_INTAKE_URL: ${LAB_PAPER_INTAKE_URL:-}
      LAB_PAPER_INTAKE_TOKEN: ${LAB_PAPER_INTAKE_TOKEN:-}
      # paper.monitor (slice G4) — adaptive paper-observation window + self-reschedule poll.
      PAPER_MONITOR_POLL_MS: ${PAPER_MONITOR_POLL_MS:-21600000}
      PAPER_WINDOW_MIN_TRADES: ${PAPER_WINDOW_MIN_TRADES:-30}
      PAPER_WINDOW_LOW_CONFIDENCE_THRESHOLD: ${PAPER_WINDOW_LOW_CONFIDENCE_THRESHOLD:-15}
      PAPER_WINDOW_MIN_DAYS: ${PAPER_WINDOW_MIN_DAYS:-3}
      PAPER_WINDOW_MAX_DAYS: ${PAPER_WINDOW_MAX_DAYS:-30}
      PAPER_MONITOR_MAX_WAIT_DAYS: ${PAPER_MONITOR_MAX_WAIT_DAYS:-7}
      # Signed backtest evidence (slice 079) — paper.start runs in this worker process.
      LAB_SIGNED_EVIDENCE_SOURCE: ${LAB_SIGNED_EVIDENCE_SOURCE:-none}
      LAB_PAPER_EVIDENCE_REQUIRED: ${LAB_PAPER_EVIDENCE_REQUIRED:-false}
      LAB_ALLOW_FIXTURE_EVIDENCE: ${LAB_ALLOW_FIXTURE_EVIDENCE:-}
      LAB_TRUSTED_SIGNERS_JSON: ${LAB_TRUSTED_SIGNERS_JSON:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [trading]

  office-server:
    build:
      context: ${TRADING_OFFICE_PATH:-../trading-office}
      dockerfile: apps/server/Dockerfile
    environment:
      OFFICE_CONNECTOR_MODE: trading-lab
      OFFICE_SERVER_PORT: "8787"
      OFFICE_CORS_ORIGIN: ${OFFICE_CORS_ORIGIN:-http://localhost:8080}
      TRADING_LAB_READ_URL: http://ingress:3100
      TRADING_LAB_READ_TOKEN: ${TRADING_LAB_READ_TOKEN:-}
      TRADING_LAB_CHAT_URL: http://ingress:3000
      TRADING_LAB_CHAT_TOKEN: ${TRADING_LAB_CHAT_TOKEN:-}
      OFFICE_PLATFORM_ENABLED: ${OFFICE_PLATFORM_ENABLED:-false}
      TRADING_PLATFORM_READ_URL: ${TRADING_PLATFORM_READ_URL:-}
      TRADING_PLATFORM_READ_TOKEN: ${TRADING_PLATFORM_READ_TOKEN:-}
    depends_on:
      ingress:
        condition: service_healthy
    expose:
      - "8787"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8787/api/office/agents/statuses').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks: [trading]

  office-web:
    build:
      context: ${TRADING_OFFICE_PATH:-../trading-office}
      dockerfile: apps/web/Dockerfile
      args:
        VITE_OFFICE_MODE: connected
        VITE_OFFICE_GATEWAY_URL: ${VITE_OFFICE_GATEWAY_URL:-http://localhost:8787}
    depends_on:
      office-server:
        condition: service_started
    expose:
      - "80"
    networks: [trading]

volumes:
  lab_pg:
  phoenix_data:

networks:
  trading:
    driver: bridge
