# Demo overlay — self-contained, key-free, no private source. Binds to 127.0.0.1.
# Adds mock-platform + backtester services so the full research demo runs without
# any private trading-platform, exchange SDKs or production credentials.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml \
#     --env-file .env.demo pull --ignore-buildable && \
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml \
#     --env-file .env.demo up
#
# All first-party images (lab / mock-platform / backtester / office-{web,server})
# are pulled from GHCR, built by each repo's "Publish image" workflow — the demo
# compiles nothing from source.
services:

  # ── mock-platform (Ops Read + snapshot replay) ─────────────────────────────
  mock-platform:
    image: ghcr.io/trdlabs/mock-platform:${MOCK_PLATFORM_IMAGE_TAG:-latest}
    environment:
      MOCK_OPS_BIND: "0.0.0.0"
      MOCK_OPS_PORT: "8839"
      MOCK_OPS_TOKEN: "${MOCK_OPS_TOKEN:-}"
      MOCK_OPS_TOKENS: "${MOCK_OPS_TOKENS:?set MOCK_OPS_TOKENS to sha256-hex of MOCK_OPS_TOKEN}"
      # The default fixture (and 2026-06-12-real-top5 / 2026-06-16-synthetic /
      # historical-golden) is baked into the image at /app/data/snapshots/fixtures
      # — no host bind-mount needed. Requires a mock-platform image built at/after
      # the fixture's commit. To replay a different (non-baked) snapshot, mount it
      # and set MOCK_SNAPSHOT_REF.
      # Default = the extended taker-era slice (2026-06-16…18, ~72 hourly buckets, full raw
      # taker_buy/sell + funding) — the 3-day span gives commitXTermMath enough 1h bars to
      # render the Long (1h) term too, not just the sub-hour terms. The single-day
      # 2026-06-18-real-all source is unchanged and still selectable.
      MOCK_SNAPSHOT_REF: "${MOCK_SNAPSHOT_REF:-fixtures/2026-06-22-to-2026-06-28-vps}"
      MOCK_REPLAY_MODE: "${MOCK_REPLAY_MODE:-loop}"
      MOCK_REPLAY_SPEED: "${MOCK_REPLAY_SPEED:-1}"
    expose:
      - "8839"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8839/ops/discover',{headers:{Authorization:'Bearer '+process.env.MOCK_OPS_TOKEN}}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: "no"
    networks: [trading]

  # ── backtester (research-read backed by mock-platform historical data) ──────
  backtester:
    image: ghcr.io/trdlabs/backtester:${BACKTESTER_IMAGE_TAG:-latest}
    environment:
      BACKTESTER_HOST: "0.0.0.0"
      BACKTESTER_PORT: "8080"
      BACKTESTER_AUTH_TOKEN: "${BACKTESTER_AUTH_TOKEN:-demo-backtester-token}"
      BACKTESTER_ENABLE_OVERLAY_ENGINE: "true"
      BACKTESTER_DATA_SOURCE: "mock"
      BACKTESTER_MOCK_PLATFORM_URL: "http://mock-platform:8839"
      BACKTESTER_MOCK_PLATFORM_TOKEN: "${MOCK_OPS_TOKEN:-}"
      # DooD sandbox: deliver per-run bundle + harness through a shared named volume so the
      # sandbox `docker run` (host daemon) sees the same content the backtester writes.
      BACKTESTER_SANDBOX_OVERLAY_VOLUME: "btx-sandbox"
      BACKTESTER_SANDBOX_OVERLAY_VOLUME_MOUNTPOINT: "/sandbox-shared"
    volumes:
      # DooD: the sandbox runner spawns sibling containers on the host daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      - btx-sandbox:/sandbox-shared
    expose:
      - "8080"
    ports:
      - "127.0.0.1:${BACKTESTER_HOST_PORT:-8081}:8080"
    depends_on:
      mock-platform:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: "no"
    networks: [trading]

  # ── phoenix UI (loopback only; open http://localhost:6006) ──
  phoenix:
    ports:
      - "127.0.0.1:${PHOENIX_PORT:-6006}:6006"
    restart: "no"

  # ── lab services: pull the lab image from GHCR (!reset drops the base anchor's
  #    `build:` so the demo never compiles lab from source) + wire mock+backtester ──
  ingress:
    build: !reset null
    image: ghcr.io/trdlabs/lab:${LAB_IMAGE_TAG:-latest}
    restart: "no"
    environment:
      LAB_BOT_RESULTS_INTEGRATION: "http"
      LAB_OPS_READ_URL: "http://mock-platform:8839"
      LAB_OPS_READ_TOKEN: "${MOCK_OPS_TOKEN:-}"
      LAB_MARKET_HISTORY_URL: http://mock-platform:8839
      TRADING_PLATFORM_INTEGRATION: "backtester"
      BACKTESTER_API_URL: "http://backtester:8080"
      BACKTESTER_API_TOKEN: "${BACKTESTER_AUTH_TOKEN:-demo-backtester-token}"
    depends_on:
      backtester:
        condition: service_healthy

  migrate:
    build: !reset null
    image: ghcr.io/trdlabs/lab:${LAB_IMAGE_TAG:-latest}

  worker:
    build: !reset null
    image: ghcr.io/trdlabs/lab:${LAB_IMAGE_TAG:-latest}
    restart: "no"
    environment:
      LAB_BOT_RESULTS_INTEGRATION: "http"
      LAB_OPS_READ_URL: "http://mock-platform:8839"
      LAB_OPS_READ_TOKEN: "${MOCK_OPS_TOKEN:-}"
      LAB_MARKET_HISTORY_URL: http://mock-platform:8839
      TRADING_PLATFORM_INTEGRATION: "backtester"
      BACKTESTER_API_URL: "http://backtester:8080"
      BACKTESTER_API_TOKEN: "${BACKTESTER_AUTH_TOKEN:-demo-backtester-token}"
      # Backtester POSTs completion here (docker DNS); token comes from .env.demo via base compose.
      TRADING_LAB_CALLBACK_PUBLIC_URL: "${TRADING_LAB_CALLBACK_PUBLIC_URL:-http://ingress:3000}"
    depends_on:
      backtester:
        condition: service_healthy

  # ── office: pull from GHCR (the web bundle bakes the loopback gateway URL at
  #    build time, so the demo's default localhost origin is already correct) ──
  office-web:
    build: !reset null
    image: ghcr.io/trdlabs/trading-office-web:${OFFICE_WEB_IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:${OFFICE_WEB_PORT:-8080}:80"
    restart: "no"

  office-server:
    build: !reset null
    image: ghcr.io/trdlabs/trading-office-server:${OFFICE_SERVER_IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:${OFFICE_SERVER_PORT:-8787}:8787"
    restart: "no"
    environment:
      OFFICE_PLATFORM_ENABLED: "true"
      TRADING_PLATFORM_READ_URL: "http://mock-platform:8839"
      TRADING_PLATFORM_READ_TOKEN: "${MOCK_OPS_TOKEN:-}"
      OPERATOR_DOWNSTREAM_BACKTESTS: "true"
    depends_on:
      mock-platform:
        condition: service_healthy

volumes:
  # Pin the real volume name: the backtester references `btx-sandbox` literally via `docker run
  # --mount src=btx-sandbox` against the HOST daemon. Without `name:`, compose would create
  # `<project>_btx-sandbox` and the sandbox would mount a different, empty volume.
  btx-sandbox:
    name: btx-sandbox
