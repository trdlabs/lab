# VPS overlay — production-like, detached (`up -d`). Restart policies on; bind via ${BIND_ADDR}.
services:
  postgres:
    restart: unless-stopped
  redis:
    restart: unless-stopped

  # U6 (F5a): pull the immutable, digest-pinned lab image published by
  # .github/workflows/docker-publish.yml instead of building on-host — staging/production
  # deploy inputs are `image@sha256:...` only (see infra/scripts/unit-deploy.sh,
  # docs/docker-vps.md). `build: !reset null` drops the base file's `x-lab-image` build
  # section (context: ., image: trading-lab:local) so compose never falls back to a local
  # build: without the reset, compose would build AND then apply the `image:` tag below,
  # silently defeating the digest pin.
  migrate:
    image: ${LAB_U6_IMAGE:?LAB_U6_IMAGE must be set to a digest-pinned lab image (repo@sha256:<64 hex>) for VPS deploys — see docs/docker-vps.md}
    build: !reset null
  ingress:
    image: ${LAB_U6_IMAGE:?LAB_U6_IMAGE must be set to a digest-pinned lab image (repo@sha256:<64 hex>) for VPS deploys — see docs/docker-vps.md}
    build: !reset null
    restart: unless-stopped
  worker:
    image: ${LAB_U6_IMAGE:?LAB_U6_IMAGE must be set to a digest-pinned lab image (repo@sha256:<64 hex>) for VPS deploys — see docs/docker-vps.md}
    build: !reset null
    restart: unless-stopped

  phoenix:
    ports:
      - "127.0.0.1:${PHOENIX_PORT:-6006}:6006"
    restart: unless-stopped

  # Office is NOT part of U6 (F5a) — gated behind the `office` Compose profile so
  # `docker compose config` and every U6 primitive (unit-deploy.sh / unit-health.sh, which
  # never pass --profile office) succeed on a host with no office checkout at all. Operators
  # who DO run office pass --profile office explicitly (`make vps` does this by default).
  office-web:
    profiles: ["office"]
    ports:
      - "${BIND_ADDR:-0.0.0.0}:${OFFICE_WEB_PORT:-8080}:80"
    restart: unless-stopped
  office-server:
    profiles: ["office"]
    ports:
      - "${BIND_ADDR:-0.0.0.0}:${OFFICE_SERVER_PORT:-8787}:8787"
    restart: unless-stopped
    environment:
      OFFICE_PLATFORM_ENABLED: ${OFFICE_PLATFORM_ENABLED:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # OPTIONAL — same guard as local; enable with --profile private-path-check.
  private-path-check:
    image: busybox:1.36
    profiles: ["private-path-check"]
    volumes:
      - type: bind
        source: ${PRIVATE_RUNTIME_PATH:-/opt/trading-platform}
        target: /private-runtime
        read_only: true
        bind:
          create_host_path: false
    command: ["sh", "-c", "test -n \"$(ls -A /private-runtime 2>/dev/null)\" || (echo 'PRIVATE_RUNTIME_PATH missing or empty' >&2; exit 1)"]
    networks: [trading]
